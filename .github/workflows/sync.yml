name: Periodic Full Sync

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分ごとに実行
  workflow_dispatch: # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call full sync endpoint
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.BACKEND_URL }}/api/sync/trigger-async" \
            -H "Content-Type: application/json" \
            --max-time 30)

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" != "200" ]; then
            echo "❌ Sync trigger failed with status $response"
            exit 1
          fi

          echo "✅ Full sync triggered successfully"
